upstream britannia_api {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 80;
    server_name _;

    # Gzip compression
    gzip on;
    gzip_types application/json text/plain;
    # NOTE: text/event-stream intentionally excluded — gzip buffers SSE events

    # Global proxy settings
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Health check (short timeout)
    location /health {
        proxy_pass http://britannia_api;
        proxy_read_timeout 5s;
    }

    # SSE streaming endpoint — special config
    location /api/branding/generate/stream {
        proxy_pass http://britannia_api;
        proxy_read_timeout 300s;        # 5 min for long generation
        proxy_buffering off;             # CRITICAL for SSE
        proxy_cache off;
        proxy_set_header Connection '';  # Enable HTTP/1.1 keepalive
        chunked_transfer_encoding off;
    }

    # All other API routes — standard timeout
    location /api/ {
        proxy_pass http://britannia_api;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Serve generated images directly (optional, if not using S3/CloudFront)
    location /generated-images/ {
        alias /app/generated-images/;
        expires 1d;
        add_header Cache-Control "public, immutable";
    }
}
